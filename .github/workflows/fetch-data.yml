name: Update Satellite Data
on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch satellite data from CelesTrak
        run: node scripts/fetch-satellites.cjs
        timeout-minutes: 5

      - name: Verify cache is non-empty
        run: |
          SIZE=$(stat -c%s public/data/satellites-cache.json 2>/dev/null || echo 0)
          echo "Cache size: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::Cache file too small, fetch likely failed"
            exit 1
          fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "satellite data update $(date -u +%Y-%m-%d)"
          git push

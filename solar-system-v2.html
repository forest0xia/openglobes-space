<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太阳系模拟器 V2 | Solar System Simulator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030014;--accent:#4FC3F7;--accent2:#FFB74D;--accent3:#CE93D8;--accent4:#81C784;
  --glass:rgba(10,15,40,0.78);--glass-border:rgba(79,195,247,0.15);
  --text:#E0E6ED;--text-dim:#7B8CA8;--danger:#EF5350;--warn:#FFB74D;
  --font-display:'Orbitron',monospace;--font-body:'Noto Sans SC',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;height:100vh;width:100vw;cursor:grab}
body:active{cursor:grabbing}
#canvas-container{position:fixed;inset:0;z-index:1}
canvas{display:block}

/* Top Bar */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:linear-gradient(180deg,rgba(3,0,20,0.92) 0%,transparent 100%);pointer-events:none}
.top-bar>*{pointer-events:auto}
.logo{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:4px;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 12px var(--accent);animation:pulse-glow 2s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px var(--accent)}50%{box-shadow:0 0 20px var(--accent),0 0 40px rgba(79,195,247,0.3)}}

.top-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.ctrl-btn{background:var(--glass);border:1px solid var(--glass-border);color:var(--text-dim);font-family:var(--font-body);font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .3s;backdrop-filter:blur(10px);white-space:nowrap}
.ctrl-btn:hover,.ctrl-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(79,195,247,0.08)}
.ctrl-btn.whatif-active{color:var(--accent2);border-color:var(--accent2);background:rgba(255,183,77,0.1)}
.ctrl-divider{width:1px;height:20px;background:var(--glass-border);margin:0 4px}

/* Time Control */
.time-control{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:10px;padding:8px 18px;background:var(--glass);border:1px solid var(--glass-border);border-radius:40px;backdrop-filter:blur(20px)}
.time-btn{background:none;border:1px solid transparent;color:var(--text-dim);font-size:16px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.time-btn:hover{color:var(--accent);border-color:var(--glass-border);background:rgba(79,195,247,0.05)}
.time-btn.active{color:var(--accent);background:rgba(79,195,247,0.1);border-color:var(--accent)}
.speed-display{font-family:var(--font-display);font-size:12px;color:var(--accent);min-width:60px;text-align:center;letter-spacing:1px}
.time-slider{-webkit-appearance:none;width:100px;height:3px;background:rgba(79,195,247,0.2);border-radius:2px;outline:none}
.time-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px rgba(79,195,247,0.5)}

/* Planet Nav */
.planet-nav{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:3px}
.planet-dot{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;position:relative;background:rgba(10,15,40,0.5)}
.planet-dot:hover{border-color:var(--glass-border);transform:scale(1.15)}
.planet-dot.active{border-color:var(--accent);box-shadow:0 0 12px rgba(79,195,247,0.2)}
.planet-dot-inner{width:10px;height:10px;border-radius:50%;transition:all .3s}
.planet-dot:hover .planet-dot-inner{transform:scale(1.3)}
.planet-dot-label{position:absolute;left:42px;font-size:11px;font-weight:500;color:var(--text-dim);white-space:nowrap;opacity:0;transform:translateX(-5px);transition:all .3s;pointer-events:none}
.planet-dot:hover .planet-dot-label{opacity:1;transform:translateX(0)}

/* Info Panel */
.info-panel{position:fixed;right:20px;top:50%;transform:translateY(-50%) translateX(20px);z-index:100;width:310px;max-height:80vh;overflow-y:auto;background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;backdrop-filter:blur(25px);padding:24px;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.4,0,.2,1)}
.info-panel.visible{opacity:1;pointer-events:auto;transform:translateY(-50%) translateX(0)}
.info-panel::-webkit-scrollbar{width:4px}
.info-panel::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:2px}
.info-panel-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .3s}
.info-panel-close:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.info-planet-name{font-family:var(--font-display);font-size:20px;font-weight:900;letter-spacing:2px;margin-bottom:3px}
.info-planet-name-cn{font-size:13px;color:var(--text-dim);margin-bottom:16px;font-weight:300}
.info-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.info-stat{display:flex;flex-direction:column;gap:2px}
.info-stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.info-stat-value{font-family:var(--font-display);font-size:12px;color:var(--accent)}
.info-divider{height:1px;background:var(--glass-border);margin:14px 0}
.info-fact{font-size:12px;line-height:1.7;color:var(--text);font-weight:300}
.info-fact-label{font-size:9px;color:var(--accent2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:500}
.info-moons{margin-top:12px}
.info-moons-title{font-size:9px;color:var(--accent3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.info-moon-tag{display:inline-block;background:rgba(206,147,216,0.1);border:1px solid rgba(206,147,216,0.2);color:var(--accent3);font-size:10px;padding:2px 8px;border-radius:10px;margin:2px 3px 2px 0}

/* What-If Panel */
.whatif-panel{position:fixed;left:70px;bottom:80px;z-index:100;width:300px;background:var(--glass);border:1px solid rgba(255,183,77,0.2);border-radius:16px;backdrop-filter:blur(25px);padding:20px;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.4,0,.2,1);transform:translateY(10px)}
.whatif-panel.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
.whatif-title{font-family:var(--font-display);font-size:12px;color:var(--accent2);letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.whatif-group{margin-bottom:14px}
.whatif-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;display:flex;justify-content:space-between}
.whatif-label span{color:var(--accent2);font-family:var(--font-display);font-size:10px}
.whatif-slider{-webkit-appearance:none;width:100%;height:4px;background:rgba(255,183,77,0.15);border-radius:2px;outline:none}
.whatif-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent2);cursor:pointer;box-shadow:0 0 8px rgba(255,183,77,0.4)}
.whatif-desc{font-size:11px;color:var(--text-dim);line-height:1.6;margin-top:10px;padding:10px;background:rgba(255,183,77,0.05);border-radius:10px;border:1px solid rgba(255,183,77,0.1)}
.whatif-reset{background:none;border:1px solid rgba(255,183,77,0.3);color:var(--accent2);font-size:11px;padding:5px 14px;border-radius:12px;cursor:pointer;margin-top:8px;transition:all .3s;font-family:var(--font-body)}
.whatif-reset:hover{background:rgba(255,183,77,0.1)}

/* Probe Legend */
.probe-legend{position:fixed;left:70px;top:70px;z-index:100;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;backdrop-filter:blur(15px);padding:14px 16px;opacity:0;pointer-events:none;transition:all .3s;max-width:280px}
.probe-legend.visible{opacity:1;pointer-events:auto}
.probe-legend-title{font-family:var(--font-display);font-size:10px;color:var(--accent4);letter-spacing:2px;margin-bottom:10px}
.probe-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;padding:3px 6px;border-radius:8px;transition:background .2s}
.probe-item:hover{background:rgba(255,255,255,0.03)}
.probe-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.probe-name{font-size:11px;color:var(--text);font-weight:500}
.probe-desc{font-size:10px;color:var(--text-dim);margin-left:16px;margin-bottom:4px}

/* Tooltip */
.hover-tooltip{position:fixed;z-index:200;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(10px);padding:5px 10px;border-radius:8px;font-size:11px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .2s;font-family:var(--font-body)}
.hover-tooltip.visible{opacity:1}

/* Loading */
.loading-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-text{font-family:var(--font-display);font-size:11px;color:var(--accent);letter-spacing:6px;margin-top:20px;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
.loading-ring{width:50px;height:50px;border:2px solid rgba(79,195,247,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Scale toggle */
.scale-toggle{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:2px;background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:2px;backdrop-filter:blur(10px)}
.scale-btn{background:none;border:none;color:var(--text-dim);font-family:var(--font-body);font-size:10px;padding:4px 12px;border-radius:14px;cursor:pointer;transition:all .3s}
.scale-btn.active{background:rgba(79,195,247,0.12);color:var(--accent)}

@media(max-width:768px){
  .info-panel{width:calc(100vw - 40px);right:20px;top:auto;bottom:130px;transform:translateY(20px);max-height:45vh}
  .info-panel.visible{transform:translateY(0)}
  .planet-nav{display:none}
  .whatif-panel{left:20px;right:20px;width:auto;bottom:130px}
  .probe-legend{left:20px;right:20px;max-width:none}
}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-ring"></div>
  <div class="loading-text">INITIALIZING SOLAR SYSTEM</div>
</div>

<div id="canvas-container"></div>

<!-- Top Bar -->
<div class="top-bar">
  <div class="logo"><div class="logo-dot"></div>SOLAR SYSTEM V2</div>
  <div class="top-controls">
    <button class="ctrl-btn active" onclick="setView('top')">俯视</button>
    <button class="ctrl-btn" onclick="setView('side')">侧视</button>
    <button class="ctrl-btn" onclick="setView('free')">自由</button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" id="toggleMoons" onclick="toggleLayer('moons')">🌙 卫星</button>
    <button class="ctrl-btn" id="toggleBelt" onclick="toggleLayer('belt')">☄️ 小行星带</button>
    <button class="ctrl-btn" id="toggleProbes" onclick="toggleLayer('probes')">🛰 探测器</button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" id="toggleWhatif" onclick="toggleWhatIf()">🧪 What-If</button>
  </div>
</div>

<!-- Planet Nav -->
<div class="planet-nav" id="planetNav"></div>

<!-- Info Panel -->
<div class="info-panel" id="infoPanel">
  <button class="info-panel-close" onclick="closeInfoPanel()">✕</button>
  <div id="infoPlanetName" class="info-planet-name"></div>
  <div id="infoPlanetNameCn" class="info-planet-name-cn"></div>
  <div class="info-stats" id="infoStats"></div>
  <div class="info-divider"></div>
  <div class="info-fact-label">💡 你知道吗？</div>
  <div class="info-fact" id="infoFact"></div>
  <div class="info-moons" id="infoMoons"></div>
</div>

<!-- What-If Panel -->
<div class="whatif-panel" id="whatifPanel">
  <div class="whatif-title">🧪 WHAT-IF 实验室</div>
  <div class="whatif-group">
    <div class="whatif-label">太阳质量 <span id="sunMassVal">1.0x</span></div>
    <input type="range" class="whatif-slider" id="sunMassSlider" min="0.1" max="5" step="0.1" value="1" oninput="updateWhatIf()">
  </div>
  <div class="whatif-group">
    <div class="whatif-label">地球距离 <span id="earthDistVal">1.0 AU</span></div>
    <input type="range" class="whatif-slider" id="earthDistSlider" min="0.3" max="3" step="0.1" value="1" oninput="updateWhatIf()">
  </div>
  <div class="whatif-group">
    <div class="whatif-label">木星存在 <span id="jupiterExistVal">存在</span></div>
    <input type="range" class="whatif-slider" id="jupiterSlider" min="0" max="1" step="1" value="1" oninput="updateWhatIf()">
  </div>
  <div class="whatif-desc" id="whatifDesc">调整参数，观察太阳系如何变化。物理模拟基于开普勒定律简化模型。</div>
  <button class="whatif-reset" onclick="resetWhatIf()">⟳ 重置参数</button>
</div>

<!-- Probe Legend -->
<div class="probe-legend" id="probeLegend">
  <div class="probe-legend-title">🛰 SPACE PROBES</div>
  <div id="probeList"></div>
</div>

<!-- Scale Toggle -->
<div class="scale-toggle">
  <button class="scale-btn active" onclick="setScale('visual',this)">可视化</button>
  <button class="scale-btn" onclick="setScale('log',this)">对数</button>
</div>

<!-- Time Control -->
<div class="time-control">
  <button class="time-btn" onclick="changeSpeed(-1)">⏪</button>
  <button class="time-btn active" id="playBtn" onclick="togglePause()">⏸</button>
  <button class="time-btn" onclick="changeSpeed(1)">⏩</button>
  <input type="range" class="time-slider" id="timeSlider" min="-3" max="5" step="0.5" value="1" oninput="setSpeedFromSlider(this.value)">
  <div class="speed-display" id="speedDisplay">1x</div>
  <button class="time-btn" onclick="resetView()">⟳</button>
</div>

<div class="hover-tooltip" id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//  DATA
// ============================================================
const PLANETS = [
  { name:'Sun',nameCn:'太阳 — 恒星',color:0xFDB813,emissive:0xFDB813,radius:5,distance:0,speed:0,tilt:0,isSun:true,
    stats:{'直径':'1,392,700 km','表面温度':'5,500°C','类型':'黄矮星 G2V','年龄':'45.7 亿年'},
    fact:'太阳每秒将约400万吨物质转化为能量。光从核心到表面需约17万年，但从表面到地球只需8分20秒。',moons:[]},
  { name:'Mercury',nameCn:'水星 — 最近的行星',color:0x9B9B9B,emissive:0x2A2A2A,radius:0.5,distance:10,speed:4.15,tilt:0.03,
    stats:{'直径':'4,879 km','公转周期':'88 天','温度':'-180~430°C','卫星':'0'},
    fact:'水星是温差最大的行星：白天430°C，夜晚-180°C。它并非最热——金星因温室效应更热。',moons:[]},
  { name:'Venus',nameCn:'金星 — 地球姐妹星',color:0xE8CDA0,emissive:0x3D3020,radius:0.9,distance:15,speed:1.62,tilt:177.4,
    stats:{'直径':'12,104 km','公转周期':'225 天','表面温度':'462°C','大气压':'92 倍'},
    fact:'金星"倒转"自转，太阳从西边升起。一天（243地球日）比一年（225地球日）还长。',moons:[]},
  { name:'Earth',nameCn:'地球 — 我们的家',color:0x4A90D9,emissive:0x112244,radius:1,distance:20,speed:1.0,tilt:23.44,
    stats:{'直径':'12,756 km','公转周期':'365.25 天','平均温度':'15°C','卫星':'1'},
    fact:'地球71%被水覆盖，但所有水收集成球直径仅约1,385km——比月球小。每天100吨太空尘埃落入大气。',

    moons:[{name:'Phobos',nameCn:'火卫一',color:0x8B7D6B,radius:0.12,distance:1.5,speed:30},{name:'Deimos',nameCn:'火卫二',color:0x9B9080,radius:0.08,distance:2.0,speed:18}]},
  { name:'Jupiter',nameCn:'木星 — 巨人之王',color:0xC88B3A,emissive:0x2D1F0A,radius:3.2,distance:38,speed:0.084,tilt:3.13,
    stats:{'直径':'142,984 km','公转周期':'11.86 年','温度':'-110°C','已知卫星':'95'},
    fact:'大红斑风暴持续400+年，能容纳整个地球。木星的引力是太阳系"保镖"，偏转了无数危险小行星。',
    moons:[{name:'Io',nameCn:'木卫一',color:0xE8C84A,radius:0.25,distance:5.0,speed:8},{name:'Europa',nameCn:'木卫二',color:0xC8D8E8,radius:0.22,distance:6.2,speed:5.5},{name:'Ganymede',nameCn:'木卫三',color:0xA0A8A0,radius:0.35,distance:7.5,speed:3.5},{name:'Callisto',nameCn:'木卫四',color:0x706860,radius:0.32,distance:9.0,speed:2.2}]},
  { name:'Saturn',nameCn:'土星 — 环中之王',color:0xE4D191,emissive:0x332D15,radius:2.7,distance:52,speed:0.034,tilt:26.73,hasRing:true,
    stats:{'直径':'120,536 km','公转周期':'29.46 年','温度':'-140°C','已知卫星':'146'},
    fact:'土星密度比水低——理论上它会浮在水面。它的环宽28万公里，厚度仅约10米。',
    moons:[{name:'Titan',nameCn:'土卫六',color:0xD4A050,radius:0.35,distance:5.5,speed:4},{name:'Enceladus',nameCn:'土卫二',color:0xE8E8F0,radius:0.15,distance:4.0,speed:7},{name:'Mimas',nameCn:'土卫一',color:0xC0C0C0,radius:0.1,distance:3.2,speed:10}]},
  { name:'Uranus',nameCn:'天王星 — 冰巨人',color:0x9FC4C7,emissive:0x1A2D2E,radius:1.8,distance:64,speed:0.012,tilt:97.77,
    stats:{'直径':'51,118 km','公转周期':'84 年','温度':'-195°C','已知卫星':'28'},
    fact:'天王星倾斜98°"躺着"公转，每个极点交替经历42年白天和42年黑夜。',
    moons:[{name:'Titania',nameCn:'天卫三',color:0xB8B0A8,radius:0.2,distance:3.5,speed:5},{name:'Miranda',nameCn:'天卫五',color:0xA0A0A0,radius:0.1,distance:2.5,speed:9}]},
  { name:'Neptune',nameCn:'海王星 — 风暴之星',color:0x3E54E8,emissive:0x0A0F33,radius:1.7,distance:74,speed:0.006,tilt:28.32,
    stats:{'直径':'49,528 km','公转周期':'164.8 年','温度':'-200°C','已知卫星':'16'},
    fact:'海王星风速达2,100km/h（1.6倍音速）。它是唯一通过数学预测发现的行星（1846年）。',
    moons:[{name:'Triton',nameCn:'海卫一',color:0xC0C8D8,radius:0.22,distance:3.5,speed:5}]}
];

const PROBES = [
  { name:'Voyager 1',nameCn:'旅行者1号',color:0x81C784,launched:1977,
    desc:'1977年发射，已飞出日球层，是离地球最远的人造物体（约240亿km）。',
    position:{ distance:160, angle:0.7 }},
  { name:'Voyager 2',nameCn:'旅行者2号',color:0x4DB6AC,launched:1977,
    desc:'唯一访问过天王星和海王星的探测器，2018年穿越日球层。',

// ============================================================
//  CREATE TEXTURE HELPER
// ============================================================
function makeTexture(color, type){
  const c=document.createElement('canvas');c.width=256;c.height=128;const x=c.getContext('2d');
  const r=(color>>16)&0xFF,g=(color>>8)&0xFF,b=color&0xFF;
  if(type==='sun'){
    const gr=x.createRadialGradient(128,64,10,128,64,128);
    gr.addColorStop(0,`rgb(${Math.min(255,r+60)},${Math.min(255,g+40)},${b})`);
    gr.addColorStop(0.5,`rgb(${r},${g},${b})`);gr.addColorStop(1,`rgb(${Math.max(0,r-40)},${Math.max(0,g-30)},${b})`);
    x.fillStyle=gr;x.fillRect(0,0,256,128);
    for(let i=0;i<40;i++){x.beginPath();x.arc(Math.random()*256,Math.random()*128,Math.random()*18+4,0,Math.PI*2);x.fillStyle=`rgba(${Math.min(255,r+80)},${Math.min(255,g+50)},0,${Math.random()*0.3})`;x.fill();}
  } else if(type==='gas'){
    x.fillStyle=`rgb(${r},${g},${b})`;x.fillRect(0,0,256,128);
    for(let y=0;y<128;y+=3){const v=Math.sin(y*0.15)*20;x.fillStyle=`rgba(${Math.max(0,r+v)},${Math.max(0,g+v*0.5)},${Math.max(0,b+v*0.3)},0.4)`;x.fillRect(0,y,256,2);}
  } else {
    x.fillStyle=`rgb(${r},${g},${b})`;x.fillRect(0,0,256,128);
    for(let i=0;i<80;i++){x.beginPath();x.arc(Math.random()*256,Math.random()*128,Math.random()*7+2,0,Math.PI*2);x.fillStyle=`rgba(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)},${Math.random()*0.3})`;x.fill();}
  }
  const t=new THREE.CanvasTexture(c);t.wrapS=THREE.RepeatWrapping;return t;
}

const planetMeshes=[], moonMeshes=[], orbitLines=[], moonOrbitLines=[];

PLANETS.forEach((p,idx)=>{
  const isGas=['Jupiter','Saturn','Uranus','Neptune'].includes(p.name);
  const tex=makeTexture(p.color, p.isSun?'sun':isGas?'gas':'rock');
  const mat = p.isSun ? new THREE.MeshBasicMaterial({map:tex}) : new THREE.MeshStandardMaterial({map:tex,roughness:isGas?0.8:0.6,metalness:0.1,emissive:p.emissive,emissiveIntensity:0.15});
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.radius,48,48), mat);
  
  if(p.isSun){
    const g1=new THREE.Mesh(new THREE.SphereGeometry(p.radius*1.3,32,32),new THREE.MeshBasicMaterial({color:0xFDB813,transparent:true,opacity:0.12}));
    const g2=new THREE.Mesh(new THREE.SphereGeometry(p.radius*1.8,32,32),new THREE.MeshBasicMaterial({color:0xFFA500,transparent:true,opacity:0.04}));
    mesh.add(g1);mesh.add(g2);
  }
  if(p.hasRing){
    const ring=new THREE.Mesh(new THREE.RingGeometry(p.radius*1.4,p.radius*2.4,64),new THREE.MeshBasicMaterial({color:0xD4C090,side:THREE.DoubleSide,transparent:true,opacity:0.45}));
    ring.rotation.x=Math.PI/2;mesh.add(ring);
  }
  mesh.rotation.z=(p.tilt||0)*Math.PI/180;
  mesh.userData={...p,index:idx};
  scene.add(mesh);
  planetMeshes.push(mesh);
  
  // Orbit
  if(!p.isSun){
    const oGeo=new THREE.BufferGeometry(),oPts=[];
    for(let j=0;j<=128;j++){const a=(j/128)*Math.PI*2;oPts.push(Math.cos(a)*p.distance,0,Math.sin(a)*p.distance);}
    oGeo.setAttribute('position',new THREE.Float32BufferAttribute(oPts,3));
    const oLine=new THREE.Line(oGeo,new THREE.LineBasicMaterial({color:0x4FC3F7,transparent:true,opacity:0.07}));
    scene.add(oLine);orbitLines.push(oLine);
  }
  
  // Moons
  const mMeshes=[];
  (p.moons||[]).forEach(m=>{
    const mTex=makeTexture(m.color,'rock');
    const mMat=new THREE.MeshStandardMaterial({map:mTex,roughness:0.7,metalness:0.05,emissive:0x111111,emissiveIntensity:0.1});
    const mMesh=new THREE.Mesh(new THREE.SphereGeometry(m.radius,24,24),mMat);
    mMesh.userData={...m,parentIdx:idx,isMoon:true};
    scene.add(mMesh);
    mMeshes.push({mesh:mMesh,data:m});
    
    // Moon orbit line
    const moGeo=new THREE.BufferGeometry(),moPts=[];
    for(let j=0;j<=64;j++){const a=(j/64)*Math.PI*2;moPts.push(Math.cos(a)*m.distance,0,Math.sin(a)*m.distance);}
    moGeo.setAttribute('position',new THREE.Float32BufferAttribute(moPts,3));
    const moLine=new THREE.Line(moGeo,new THREE.LineBasicMaterial({color:0xCE93D8,transparent:true,opacity:0.08}));
    scene.add(moLine);
    moonOrbitLines.push({line:moLine,parentIdx:idx,dist:m.distance});
  });
  moonMeshes.push(mMeshes);
});

const BELT_INNER=30, BELT_OUTER=36, BELT_COUNT=800;

const beltSizes=new Float32Array(BELT_COUNT);
const beltAngles=new Float32Array(BELT_COUNT);
const beltDistances=new Float32Array(BELT_COUNT);
const beltSpeeds=new Float32Array(BELT_COUNT);
const beltYOffsets=new Float32Array(BELT_COUNT);

for(let i=0;i<BELT_COUNT;i++){
  beltAngles[i]=Math.random()*Math.PI*2;
  beltDistances[i]=BELT_INNER+Math.random()*(BELT_OUTER-BELT_INNER);

  beltPositions[i*3+1]=beltYOffsets[i];
  beltPositions[i*3+2]=Math.sin(beltAngles[i])*beltDistances[i];

}
beltGeo.setAttribute('position',new THREE.BufferAttribute(beltPositions,3));
beltGeo.setAttribute('size',new THREE.BufferAttribute(beltSizes,1));

let isDragging=false, prevMouse={x:0,y:0};
let cameraAngle={theta:0.3,phi:0.8}, cameraDistance=100;
let cameraTarget=new THREE.Vector3(), targetCameraTarget=new THREE.Vector3();
let targetAngle={theta:0.3,phi:0.8}, targetDistance=100;

renderer.domElement.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
renderer.domElement.addEventListener('mousemove',e=>{
  if(isDragging){
    targetAngle.theta-=(e.clientX-prevMouse.x)*0.005;
    targetAngle.phi=Math.max(0.1,Math.min(Math.PI-0.1,targetAngle.phi-(e.clientY-prevMouse.y)*0.005));
    prevMouse={x:e.clientX,y:e.clientY};
  }
  updateTooltip(e);
});
renderer.domElement.addEventListener('mouseup',()=>isDragging=false);
renderer.domElement.addEventListener('mouseleave',()=>isDragging=false);
renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();targetDistance=Math.max(5,Math.min(250,targetDistance+e.deltaY*0.05));},{passive:false});

// Touch
let touchDist=0;
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};}
  else if(e.touches.length===2) touchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
});
renderer.domElement.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    targetAngle.theta-=(e.touches[0].clientX-prevMouse.x)*0.005;
    targetAngle.phi=Math.max(0.1,Math.min(Math.PI-0.1,targetAngle.phi-(e.touches[0].clientY-prevMouse.y)*0.005));
    prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    targetDistance=Math.max(5,Math.min(250,targetDistance-(d-touchDist)*0.1));touchDist=d;
  }
},{passive:false});
renderer.domElement.addEventListener('touchend',()=>isDragging=false);

// ============================================================
//  RAYCASTING
// ============================================================
const raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
const allClickable=[...planetMeshes,...probeMeshes];

function updateTooltip(e){
  mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  // Include visible moons
  const targets=[...planetMeshes,...probeMeshes.filter(p=>p.visible)];
  moonMeshes.forEach(arr=>arr.forEach(m=>{if(m.mesh.visible)targets.push(m.mesh);}));
  const hits=raycaster.intersectObjects(targets);
  if(hits.length>0){
    const d=hits[0].object.userData;
    let label=d.isProbe?`🛰 ${d.nameCn}`:d.isMoon?`${d.nameCn} (${d.name})`:`${(d.nameCn||'').split('—')[0].trim()} ${d.name||''}`;
    tooltip.textContent=label;
    tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-8)+'px';
    tooltip.classList.add('visible');document.body.style.cursor='pointer';
  } else {
    tooltip.classList.remove('visible');document.body.style.cursor=isDragging?'grabbing':'grab';
  }
}

renderer.domElement.addEventListener('click',e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const targets=[...planetMeshes,...probeMeshes.filter(p=>p.visible)];
  moonMeshes.forEach(arr=>arr.forEach(m=>{if(m.mesh.visible)targets.push(m.mesh);}));
  const hits=raycaster.intersectObjects(targets);
  if(hits.length>0){
    const d=hits[0].object.userData;
    if(d.isProbe) focusProbe(d.probeIdx);
    else if(d.isMoon) focusPlanet(d.parentIdx);
    else focusPlanet(d.index);
  }
});

function focusPlanet(idx){
  focusedIdx=idx;const p=PLANETS[idx];

  targetDistance=Math.max(p.radius*5,12);
  document.querySelectorAll('.planet-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));

  document.getElementById('infoPlanetName').style.color='#'+p.color.toString(16).padStart(6,'0');
  document.getElementById('infoPlanetNameCn').textContent=p.nameCn;

}

function focusProbe(idx){
  const pr=PROBES[idx];const mesh=probeMeshes[idx];
  targetCameraTarget.copy(mesh.position);targetDistance=15;
  
  const panel=document.getElementById('infoPanel');
  document.getElementById('infoPlanetName').textContent=pr.name.toUpperCase();
  document.getElementById('infoPlanetName').style.color='#'+pr.color.toString(16).padStart(6,'0');
  document.getElementById('infoPlanetNameCn').textContent=`${pr.nameCn} — ${pr.launched}年发射`;

  document.getElementById('infoMoons').innerHTML='';
  panel.classList.add('visible');
  focusedIdx=-1;
}

function closeInfoPanel(){
  document.getElementById('infoPanel').classList.remove('visible');

let whatIfActive=false;
let whatIfParams={sunMass:1,earthDist:1,jupiterExists:1};

function toggleWhatIf(){
  whatIfActive=!whatIfActive;
  document.getElementById('toggleWhatif').classList.toggle('whatif-active',whatIfActive);
  document.getElementById('whatifPanel').classList.toggle('visible',whatIfActive);
  if(!whatIfActive) resetWhatIf();

function updateWhatIf(){
  whatIfParams.sunMass=parseFloat(document.getElementById('sunMassSlider').value);
  whatIfParams.earthDist=parseFloat(document.getElementById('earthDistSlider').value);
  whatIfParams.jupiterExists=parseInt(document.getElementById('jupiterSlider').value);
  
  document.getElementById('sunMassVal').textContent=whatIfParams.sunMass.toFixed(1)+'x';
  document.getElementById('earthDistVal').textContent=whatIfParams.earthDist.toFixed(1)+' AU';
  document.getElementById('jupiterExistVal').textContent=whatIfParams.jupiterExists?'存在':'消失';
  
  // Dynamic description
  const descs=[];
  if(whatIfParams.sunMass>1.5) descs.push('☀️ 更大质量的太阳燃烧更快，寿命更短。行星轨道速度加快。');
  else if(whatIfParams.sunMass<0.5) descs.push('☀️ 较小的太阳意味着宜居带内移。地球可能需要更靠近才能保持液态水。');
  
  if(whatIfParams.earthDist>1.5) descs.push('🌍 地球远离太阳：温度骤降，海洋结冰，可能变成"雪球地球"。');
  else if(whatIfParams.earthDist<0.7) descs.push('🌍 地球太靠近太阳：温室效应失控，可能变成第二个金星。');
  
  if(!whatIfParams.jupiterExists) descs.push('🪐 没有木星的引力"保护伞"，撞击地球的小行星和彗星频率可能增加1000倍。');
  
  document.getElementById('whatifDesc').textContent=descs.length?descs.join('\n\n'):'调整参数，观察太阳系如何变化。物理模拟基于开普勒定律简化模型。';
  
  // Visual changes
  // Sun size
  const sunScale=Math.pow(whatIfParams.sunMass,0.33);
  planetMeshes[0].scale.setScalar(sunScale);
  sunLight.intensity=2*whatIfParams.sunMass;
  
  // Jupiter visibility
  planetMeshes[5].visible=!!whatIfParams.jupiterExists;
  moonMeshes[5].forEach(m=>m.mesh.visible=!!whatIfParams.jupiterExists&&layers.moons);
}

function resetWhatIf(){
  document.getElementById('sunMassSlider').value=1;
  document.getElementById('earthDistSlider').value=1;
  document.getElementById('jupiterSlider').value=1;
  whatIfParams={sunMass:1,earthDist:1,jupiterExists:1};
  updateWhatIf();
  planetMeshes[0].scale.setScalar(1);sunLight.intensity=2;
  planetMeshes[5].visible=true;
}

}
function togglePause(){isPaused=!isPaused;document.getElementById('playBtn').textContent=isPaused?'▶':'⏸';document.getElementById('playBtn').classList.toggle('active',!isPaused);}
function setSpeedFromSlider(v){timeSpeed=Math.pow(2,parseFloat(v));updateSpeedDisplay();}
function updateSpeedDisplay(){
  document.getElementById('speedDisplay').textContent=timeSpeed>=1?Math.round(timeSpeed)+'x':timeSpeed.toFixed(2)+'x';
  document.getElementById('timeSlider').value=Math.log2(timeSpeed);
}
function setView(type){
  document.querySelectorAll('.top-controls .ctrl-btn').forEach((b,i)=>{if(i<3)b.classList.remove('active');});
  event.target.classList.add('active');
  if(type==='top'){targetAngle={theta:0,phi:0.15};targetDistance=100;targetCameraTarget.set(0,0,0);}
  else if(type==='side'){targetAngle={theta:0,phi:Math.PI/2};targetDistance=100;targetCameraTarget.set(0,0,0);}
}
function setScale(mode,btn){
  scaleMode=mode;document.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
}
function resetView(){
  targetAngle={theta:0.3,phi:0.8};targetDistance=100;targetCameraTarget.set(0,0,0);
  focusedIdx=-1;closeInfoPanel();
}

// ============================================================
//  MAIN ANIMATION LOOP
// ============================================================
let time=0;
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  if(!isPaused) time+=dt*timeSpeed*0.3;
  
  // === Update Planets ===
  PLANETS.forEach((p,idx)=>{
    if(p.isSun){planetMeshes[idx].rotation.y=time*0.05;return;}
    
    let dist=p.distance;
    // What-if earth distance
    if(whatIfActive&&p.name==='Earth') dist=p.distance*whatIfParams.earthDist;
    
    // Scale mode
    const visDist = scaleMode==='log'? Math.log2(dist+1)*8 : dist;
    
    // Kepler: speed ∝ 1/√(distance) × √(sunMass)
    let speedMult=1;
    if(whatIfActive) speedMult=Math.sqrt(whatIfParams.sunMass);
    
    const angle=time*p.speed*speedMult;
    planetMeshes[idx].position.x=Math.cos(angle)*visDist;
    planetMeshes[idx].position.z=Math.sin(angle)*visDist;
    if(!isPaused) planetMeshes[idx].rotation.y+=dt*0.3;
    
    // Update orbit line
    if(idx>0&&orbitLines[idx-1]){
      const pts=[];
      for(let j=0;j<=128;j++){const a=(j/128)*Math.PI*2;pts.push(Math.cos(a)*visDist,0,Math.sin(a)*visDist);}
      orbitLines[idx-1].geometry.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    }
  });
  
  // === Update Moons ===
  if(layers.moons){
    moonMeshes.forEach((arr,pIdx)=>{
      const parentPos=planetMeshes[pIdx].position;
      arr.forEach(({mesh,data})=>{
        if(!mesh.visible) return;
        const mAngle=time*data.speed*0.3;
        mesh.position.x=parentPos.x+Math.cos(mAngle)*data.distance;
        mesh.position.y=parentPos.y;
        mesh.position.z=parentPos.z+Math.sin(mAngle)*data.distance;
        if(!isPaused) mesh.rotation.y+=dt*0.5;
      });
    });
    moonOrbitLines.forEach(o=>{
      if(!o.line.visible)return;
      const pp=planetMeshes[o.parentIdx].position;
      const pts=[];
      for(let j=0;j<=64;j++){const a=(j/64)*Math.PI*2;pts.push(pp.x+Math.cos(a)*o.dist,pp.y,pp.z+Math.sin(a)*o.dist);}
      o.line.geometry.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    });
  }
  
  // === Update Asteroid Belt ===
  if(layers.belt){
    const pos=beltPoints.geometry.attributes.position.array;
    for(let i=0;i<BELT_COUNT;i++){
      if(!isPaused) beltAngles[i]+=dt*beltSpeeds[i]*timeSpeed*0.3;
      let d=beltDistances[i];
      if(scaleMode==='log') d=Math.log2(d+1)*8;
      pos[i*3]=Math.cos(beltAngles[i])*d;
      pos[i*3+2]=Math.sin(beltAngles[i])*d;
    }
    beltPoints.geometry.attributes.position.needsUpdate=true;
  }
  
  // === Update Probes ===
  if(layers.probes){
    PROBES.forEach((pr,i)=>{
      const mesh=probeMeshes[i];
      if(!mesh.visible)return;
      
      if(pr.position.orbitPlanet!==undefined){
        // Orbiting a planet
        const pp=planetMeshes[pr.position.orbitPlanet].position;
        const oAngle=time*1.5+i*2;
        const oDist=pr.position.orbitDist||3;
        mesh.position.x=pp.x+Math.cos(oAngle)*oDist;
        mesh.position.y=pp.y+Math.sin(oAngle*0.5)*0.3;
        mesh.position.z=pp.z+Math.sin(oAngle)*oDist;
      } else {
        // Deep space — slow drift
        const d=scaleMode==='log'?Math.log2(pr.position.distance+1)*8:pr.position.distance;
        const driftAngle=pr.position.angle+time*0.002;
        mesh.position.x=Math.cos(driftAngle)*d;
        mesh.position.y=Math.sin(time*0.1+i)*1.5;
        mesh.position.z=Math.sin(driftAngle)*d;
      }
      
      // Rotate probe
      mesh.rotation.y+=dt*2;
      mesh.rotation.x+=dt*0.5;
      
      // Trail
      const trail=probeTrails[i];
      trail.positions.push(mesh.position.x,mesh.position.y,mesh.position.z);
      if(trail.positions.length>180) trail.positions.splice(0,3);
      const tArr=new Float32Array(trail.positions);
      trail.line.geometry.setAttribute('position',new THREE.BufferAttribute(tArr,3));
    });
  }
  
  // === Track focused ===
  if(focusedIdx>=0) targetCameraTarget.copy(planetMeshes[focusedIdx].position);
  
  // === Smooth Camera ===
  const lf=1-Math.pow(0.01,dt);
  cameraAngle.theta+=(targetAngle.theta-cameraAngle.theta)*lf;
  cameraAngle.phi+=(targetAngle.phi-cameraAngle.phi)*lf;
  cameraDistance+=(targetDistance-cameraDistance)*lf;
  cameraTarget.lerp(targetCameraTarget,lf);
  
  camera.position.x=cameraTarget.x+cameraDistance*Math.sin(cameraAngle.phi)*Math.cos(cameraAngle.theta);
  camera.position.y=cameraTarget.y+cameraDistance*Math.cos(cameraAngle.phi);
  camera.position.z=cameraTarget.z+cameraDistance*Math.sin(cameraAngle.phi)*Math.sin(cameraAngle.theta);
  camera.lookAt(cameraTarget);
  
  renderer.render(scene,camera);
}

// ============================================================
//  RESIZE & START
// ============================================================
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// Init probe legend
setTimeout(()=>document.getElementById('probeLegend').classList.add('visible'),2000);

setTimeout(()=>document.getElementById('loading').classList.add('hidden'),1200);
animate();
</script>
